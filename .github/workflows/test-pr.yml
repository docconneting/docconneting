name: Test Every PR

on:
  push:
    branches:
      - feat/cicd  # 이 브랜치에 push될 때마다 작동
  workflow_dispatch:  # 수동 실행도 가능하게


permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "0000"
          MYSQL_DATABASE: docconneting_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # JDK 설정
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Gradle 권한 설정
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # test dir 생성
      - name: Create test resource dir
        run: mkdir -p src/test/resources

      # application-test.yml 생성
      - name: Write application.yml in test resources
        run: echo "${{ secrets.APPLICATION_TEST_YML_BASE64 }}" | base64 -d > src/test/resources/application.yml


      # DB 연결 테스트
      - name: Check MySQL connection
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW DATABASES;"

      # MySQL 대기 (초기화 시간 확보)
      - name: Wait for MySQL to be ready
        run: sleep 20

      # 테스트 실행 (test profile 활성화)
      - name: Run Tests with `test` profile
        run: ./gradlew test -Dspring.profiles.active=test
