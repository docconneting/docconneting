name: Test Every PR

on:
  push:
    branches:
      - feat/cicd  # 이 브랜치에 push될 때마다 작동
  workflow_dispatch:  # 수동 실행도 가능하게

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "0000"
          MYSQL_DATABASE: docconneting_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # JDK 설정
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Gradle 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 테스트 리소스 디렉토리 생성
      - name: Create test resource dir
        run: mkdir -p src/test/resources

      # 테스트용 application-test.yml 파일 생성
      - name: Write application.yml in test resources
        run: echo "${{ secrets.APPLICATION_TEST_YML_CONTENT }}" | base64 -d > src/test/resources/application-test.yml

      # 테스트용 Firebase 인증 파일 생성
      - name: Write test-firebase-adminsdk.json in test resources
        run: |
          mkdir -p src/test/resources/firebase
          echo "${{ secrets.FCM_CERT_JSON_CONTENT }}" | base64 -d > src/test/resources/firebase/test-firebase-adminsdk.json

      # MySQL 접속 테스트
      - name: Check MySQL connection
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW DATABASES;"

      # MySQL 준비 시간 확보
      - name: Wait for MySQL to be ready
        run: sleep 20

      # application-test.yml 내용 출력 (디버깅용)
      - name: Debug application-test.yml content
        run: cat src/test/resources/application-test.yml

      # MySQL에 접속하여 데이터베이스 및 테이블 목록 확인
      - name: MySQL connection & table check
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW DATABASES;"
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW TABLES FROM docconneting_test;"

      # Redis 접속 테스트 (선택 사항)
      - name: Check Redis connection
        run: |
          sudo apt-get update && sudo apt-get install -y redis-tools
          redis-cli -h localhost ping

      # 테스트 실행 (test 프로파일 활성화)
      - name: Run Tests with `test` profile
        run: ./gradlew test -Dspring.profiles.active=test
