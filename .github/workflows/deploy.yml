name: Deploy Main Service

on:
  push:
    branches:
      - feat/cicd            # 해당 브랜치에 push될 때 실행
  workflow_dispatch:         # 수동 실행도 가능하게 설정

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: main-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub Actions가 실행될 환경 (최신 Ubuntu)

    steps:
      # 1. GitHub 리포지토리의 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 17 환경 구성 (Gradle 빌드에 필요)
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle로 bootJar 빌드 (테스트 제외)
      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      # 4. AWS 자격증명 구성 (ECR 접근을 위해)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드 및 ECR에 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # 7. SSH 접속 설정 및 Spring Boot .env 파일 구성
      - name: Prepare SSH and .env
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.DOCCONNETING_SSH_KEY }}" | base64 --decode > ~/.ssh/docconneting.pem
          chmod 600 ~/.ssh/docconneting.pem

          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            StrictHostKeyChecking no

          Host main
            HostName ${{ secrets.MAIN_PRIVATE_IP }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          # Spring Boot용 환경 변수 (.env)
          cat <<EOF > .env
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}

          spring.data.redis.host=${{ secrets.REDIS_HOST }}
          spring.data.redis.port=6379

          redisson.address=redis://${{ secrets.REDIS_HOST }}:6379
          redisson.enabled=true
          redisson.connection-pool-size=10
          redisson.idle-connection-min=5
          redisson.timeout=10000

          spring.cloud.aws.credentials.access-key=${{ secrets.AWS_ACCESS_KEY }}
          spring.cloud.aws.credentials.secret-key=${{ secrets.AWS_SECRET_KEY }}
          spring.cloud.aws.region.static=${{ env.AWS_REGION }}
          spring.cloud.aws.s3.bucket=docconneting-bucket

          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          PORTONE_API_KEY=${{ secrets.PORTONE_API_KEY }}
          PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }}

          SPRING_RABBITMQ_ADDRESSES=${{ secrets.RABBITMQ_ADDRESSES }}
          SPRING_RABBITMQ_USERNAME=${{ secrets.SPRING_RABBITMQ_USERNAME }}
          SPRING_RABBITMQ_PASSWORD=${{ secrets.SPRING_RABBITMQ_PASSWORD }}
          SPRING_RABBITMQ_VIRTUAL_HOST=/
          SPRING_RABBITMQ_SSL_ENABLED=false

          SERVER_ID=${{ secrets.SERVER_ID }}
          SERVER_PORT=9002
          SPRING_PROFILES_ACTIVE=prod

          CHAT_QUEUE=chat
          CHAT_EXCHANGE=chat.fanout
          CHAT_ELASTICSEARCH=elasticsearch
          ALARM_QUEUE_NAME=alarm-queue

          
          EOF

      # 8. Docker Compose 파일 동적 생성
      - name: Generate docker-compose.yml dynamically
        run: |
          cat <<EOF > docker-compose.yml
          services:
            main-app:
              image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
              container_name: main-app
              restart: always
              ports:
                - "9002:9002"
              env_file:
                - .env
          EOF

      # 9. Bastion을 통해 Main EC2에 배포
      - name: Deploy to Main EC2 via Bastion
        run: |
          # EC2 서버에 필요한 파일 전송
          scp -o StrictHostKeyChecking=no docker-compose.yml .env main:/home/ubuntu/server/

          # EC2에서 Docker Compose 재시작
          ssh main <<EOF
            cd ~/server
            docker compose down --remove-orphans
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker system prune -af
            docker compose up -d
          EOF
