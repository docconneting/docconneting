name: Deploy Main Service

on:
  push:
    branches:
      - feat/cicd         # 해당 브랜치에 push될 때 실행
  workflow_dispatch:       # 수동 실행도 가능하게 설정

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: main-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 17 환경 세팅
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드 (테스트 제외)
      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      # 4. AWS 인증 설정 (ECR 사용을 위함)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # 7. SSH 접속 및 리소스 파일 준비
      - name: Prepare SSH and Resource Files
        run: |
          # SSH 키 구성
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCCONNETING_SSH_KEY }}" | base64 --decode > ~/.ssh/docconneting.pem
          chmod 600 ~/.ssh/docconneting.pem

          # SSH config 설정 (bastion → main 서버)
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            StrictHostKeyChecking no

          Host main
            HostName ${{ secrets.MAIN_PRIVATE_IP }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          # .env 파일 생성
          cat <<EOF > .env
          spring.datasource.url=${{ secrets.SPRING_DATASOURCE_URL }}
          spring.datasource.username=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          spring.datasource.password=${{ secrets.SPRING_DATASOURCE_PASSWORD }}

          spring.data.redis.host=${{ secrets.REDIS_HOST }}
          spring.data.redis.port=6379

          redisson.address=redis://${{ secrets.REDIS_HOST }}:6379
          redisson.enabled=true
          redisson.connection-pool-size=10
          redisson.idle-connection-min=5
          redisson.timeout=10000

          spring.cloud.aws.credentials.access-key=${{ secrets.AWS_ACCESS_KEY }}
          spring.cloud.aws.credentials.secret-key=${{ secrets.AWS_SECRET_KEY }}
          spring.cloud.aws.region.static=${{ env.AWS_REGION }}
          spring.cloud.aws.s3.bucket=docconneting-bucket

          jwt.secret.key=${{ secrets.JWT_SECRET_KEY }}
          portone.api.key=${{ secrets.PORTONE_API_KEY }}
          portone.api.secret=${{ secrets.PORTONE_API_SECRET }}

          spring.rabbitmq.host=${{ secrets.RABBITMQ_ADDRESSES }}
          spring.rabbitmq.username=${{ secrets.SPRING_RABBITMQ_USERNAME }}
          spring.rabbitmq.password=${{ secrets.SPRING_RABBITMQ_PASSWORD }}
          spring.rabbitmq.virtual-host=/
          spring.rabbitmq.ssl.enabled=false

          server.id=${{ secrets.SERVER_ID }}
          server.port=9002
          spring.profiles.active=prod

          chat.queue=chat
          chat.exchange=chat.fanout
          chat.elasticsearch=elasticsearch
          alarm.queue.name=alarm-queue

          spring.data.elasticsearch.uris=http://10.0.1.222:9200
          EOF

          # application-prod.yml 복원
          echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 --decode > application-prod.yml

          # message-setting.json 복원
          echo "${{ secrets.MESSAGE_SETTING_JSON_BASE64 }}" | base64 --decode > message-setting.json

      # 8. Docker Compose 파일 생성
      - name: Generate docker-compose.yml
        run: |
          cat <<EOF > docker-compose.yml
          services:
            main-app:
              image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
              container_name: main-app
              restart: always
              ports:
                - "9002:9002"
              env_file:
                - .env
          EOF

      - name: Deploy to EC2 via Bastion
        run: |
          # 파일 전송
          scp -o StrictHostKeyChecking=no docker-compose.yml .env \
            src/main/resources/application-prod.yml \
            src/main/resources/message/message-setting.json \
            main:/home/ubuntu/server/

          # EC2 서버에서 실행
          ssh main <<EOF
            cd ~/server

            # Docker Compose 실행 전, 파일 위치 조정
            mkdir -p src/main/resources/message
            mv message-setting.json src/main/resources/message/message-setting.json

            docker compose down --remove-orphans
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker system prune -af
            docker compose up -d
          EOF