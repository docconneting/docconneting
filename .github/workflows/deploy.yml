name: Deploy Main Service

on:
  push:
    branches:
      - feat/cicd            # 해당 브랜치에 push 시 실행
  workflow_dispatch:         # 수동 실행도 가능하게 설정

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: main-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub Actions 실행 환경

    steps:
      # 1. GitHub 리포지토리 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 17 환경 구성 (Gradle 빌드를 위해 필요)
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle로 bootJar 빌드 (테스트는 생략)
      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      # 4. AWS 자격 증명 구성 (ECR 접근용)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드 및 ECR 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # 7. SSH 설정 및 .env 파일 생성
      - name: Prepare SSH and .env
        run: |
          # SSH 키 디렉토리 생성 및 권한 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCCONNETING_SSH_KEY }}" | base64 --decode > ~/.ssh/docconneting.pem
          chmod 600 ~/.ssh/docconneting.pem

          # SSH ProxyJump 구성 (Bastion → Main)
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            StrictHostKeyChecking no

          Host main
            HostName ${{ secrets.MAIN_PRIVATE_IP }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          # Spring Boot에 필요한 환경변수 파일(.env) 생성
          cat <<EOF > .env
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=6379
          SERVER_ID=${{ secrets.SERVER_ID }}
          AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
          AWS_REGION=ap-northeast-2
          S3_BUCKET=docconneting-bucket
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          PORTONE_API_KEY=${{ secrets.PORTONE_API_KEY }}
          PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }}
          SPRING_RABBITMQ_ADDRESSES=${{ secrets.RABBITMQ_ADDRESSES }}
          SPRING_RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
          SPRING_RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          SPRING_RABBITMQ_VIRTUAL_HOST=/
          SPRING_RABBITMQ_SSL_ENABLED=true
          SERVER_PORT=9002
          CHAT_QUEUE=chat
          CHAT_EXCHANGE=chat.fanout
          ALARM_QUEUE_NAME=alarm-queue
          EOF

      # 7.5. docker-compose.yml 동적 생성
      - name: Generate docker-compose.yml dynamically
        run: |
          cat <<EOF > docker-compose.yml
          version: '3'
          services:
            main-app:
              image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
              container_name: main-app
              restart: always
              ports:
                - "9002:9002"
              env_file:
                - .env
          EOF

      # 8. Bastion → Main EC2에 배포 수행
      - name: Deploy to Main EC2 via Bastion
        run: |
          # Main 서버에 docker-compose.yml 및 .env 전송
          scp -o StrictHostKeyChecking=no docker-compose.yml .env main:/home/ubuntu/server/

          # Main 서버 접속 후 배포 수행
          ssh main <<'EOF'
            cd ~/server
            docker compose down --remove-orphans
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker system prune -af
            docker compose up -d
          EOF
